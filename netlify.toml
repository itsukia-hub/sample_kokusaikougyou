[build]
  command = "npm run build"
  publish = "dist/speech-demo/browser"

[build.environment]
  NODE_VERSION = "20"

# index.html は毎回サーバーに確認させる（古いバージョンを配信し続けないため）
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ハッシュ付きJSは長期キャッシュOK（ファイル名が変わるため古いのを引くことがない）
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

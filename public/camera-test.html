<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カメラ起動テスト (静的HTML)</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 20px;
    max-width: 520px;
    margin: 0 auto;
    background: #f3f4f6;
    color: #111827;
  }
  h1 { font-size: 1.15rem; margin: 0 0 8px; }
  .desc { font-size: 0.85rem; color: #4b5563; margin: 0 0 16px; line-height: 1.5; }
  .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); margin-bottom: 12px; }
  label.btn {
    display: block;
    padding: 14px;
    margin: 8px 0;
    background: #2563eb;
    color: #fff;
    text-align: center;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }
  label.btn.sec { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
  label.btn code { font-family: ui-monospace, Consolas, monospace; font-size: 0.8rem; display: block; margin-top: 4px; opacity: 0.85; }
  input[type=file] { display: none; }
  .info { font-size: 0.8rem; color: #374151; padding: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; word-break: break-all; margin: 8px 0; }
  .info strong { display: block; margin-bottom: 4px; }
  #result img { max-width: 100%; border-radius: 8px; display: block; }
  #result { font-size: 0.85rem; }
  .note { font-size: 0.8rem; color: #78350f; background: #fef3c7; padding: 10px; border-radius: 6px; margin-bottom: 12px; line-height: 1.5; }
</style>
</head>
<body>

<h1>カメラ起動テスト（静的HTML版）</h1>
<p class="desc">
  このページは <strong>Angular を通さない純粋な HTML</strong> です。<br>
  Angular 版 (<a href="/camera">/camera</a>) との挙動差で、問題箇所を切り分けます。
</p>

<div class="note">
  <strong>デバッグ用ページです</strong><br>
  各ボタンを順番にタップし、<strong>直接カメラが起動するか / ライブラリが開くか</strong>をメモしてください。
</div>

<div class="card">
  <label class="btn">
    リアカメラ
    <code>accept="image/*" capture="environment"</code>
    <input type="file" accept="image/*" capture="environment" onchange="show(event, 1)">
  </label>

  <label class="btn">
    フロントカメラ
    <code>accept="image/*" capture="user"</code>
    <input type="file" accept="image/*" capture="user" onchange="show(event, 2)">
  </label>

  <label class="btn">
    capture 値なし
    <code>accept="image/*" capture</code>
    <input type="file" accept="image/*" capture onchange="show(event, 3)">
  </label>

  <label class="btn">
    capture のみ (accept なし)
    <code>capture="environment"</code>
    <input type="file" capture="environment" onchange="show(event, 4)">
  </label>

  <label class="btn sec">
    capture なし (比較用)
    <code>accept="image/*"</code>
    <input type="file" accept="image/*" onchange="show(event, 5)">
  </label>
</div>

<div class="info">
  <strong>User Agent:</strong>
  <span id="ua"></span>
</div>

<div id="result" class="card" style="display:none;"></div>

<script>
  document.getElementById('ua').textContent = navigator.userAgent;

  function show(e, btnNum) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var url = URL.createObjectURL(file);
    var res = document.getElementById('result');
    res.style.display = 'block';
    res.innerHTML =
      '<p><strong>ボタン ' + btnNum + ' の結果:</strong></p>' +
      '<p>name: ' + file.name + '</p>' +
      '<p>type: ' + file.type + '</p>' +
      '<p>size: ' + (file.size / 1024).toFixed(1) + ' KB</p>' +
      '<img src="' + url + '">';
    e.target.value = '';
  }
</script>

</body>
</html>

<main class="container">
  <header>
    <h1>モバイル音声入力デモ</h1>
    <p class="subtitle">マイクアイコンをタップして話してください</p>
  </header>

  <section class="card">
    <div class="input-wrapper">
      <textarea
        class="input-area"
        rows="4"
        [value]="textValue()"
        (input)="onTextInput($event)"
        placeholder="ここに音声認識の結果が入ります"></textarea>

      <button
        type="button"
        class="mic-icon"
        [class.listening]="state() === 'listening'"
        [disabled]="!supported"
        (click)="toggleListening()"
        [attr.aria-label]="state() === 'listening' ? '音声入力を停止' : '音声入力を開始'">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" aria-hidden="true">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
          <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V20H8a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2h-3v-2.08A7 7 0 0 0 19 11z"/>
        </svg>
      </button>
    </div>

    <p class="status" [class.error]="statusIsError">{{ statusText }}</p>
  </section>

  <footer>
    <small>検出環境: {{ deviceInfo }}</small>
    <small class="build-info">
      build: {{ buildInfo.commit }}&#64;{{ buildInfo.branch }}
      <span>({{ buildTimeDisplay }})</span>
    </small>
  </footer>
</main>
